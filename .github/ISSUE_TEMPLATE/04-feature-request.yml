name: Feature request
description: Propose a feature. Describe the use case and the problem it solves.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: The problem or workflow this serves.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine it working. Optional.
  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds today
      description: How you handle this now, if at all. Optional.
